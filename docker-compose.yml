version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: codearchive_db
    environment:
      POSTGRES_USER: codearchive_user
      POSTGRES_PASSWORD: codearchive_password
      POSTGRES_DB: codearchive_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codearchive_user -d codearchive_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codearchive_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: codearchive_db
      DB_USER: codearchive_user
      DB_PASS: codearchive_password
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codearchive_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
